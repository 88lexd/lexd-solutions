---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: svc-ngrok-monitor

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rl-ngrok-monitor
rules:
- apiGroups: [""]
  resources: ["*"]
  verbs: ["*"]
  resourceNames: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rlb-ngrok-monitor
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: rl-ngrok-monitor
subjects:
- kind: ServiceAccount
  name: svc-ngrok-monitor


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ngrok-monitor-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ngrok-monitor-cron-pod
  template:
    metadata:
      labels:
        app: ngrok-monitor-cron-pod
    spec:
      serviceAccountName: svc-ngrok-monitor
      automountServiceAccountToken: true
      containers:
      - image: 88lexd/ngrok-bot
        # imagePullPolicy: Always
        name: ngrok-monitor-cron
        command: ["python3"]
        args: ["/app/main.py"]
